<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Notker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />
    <style>
      html, body { margin: 0; height: 100%; }
      body { display: flex; flex-direction: column; font-family: var(--font); }
      #app { flex: 1 1 auto; overflow: auto; }
      /* F2 — paleta de neumas, tooltips e régua de pauta */
      .neume-palette { position: fixed; top: 18%; left: 50%; transform: translateX(-50%); width: 520px; max-height: 60vh; background: var(--surface); color: var(--ink); border: 1px solid var(--rule); box-shadow: 0 8px 30px rgba(0,0,0,.25); display: flex; flex-direction: column; z-index: 1000; font-family: serif; }
      .neume-palette input { padding: 10px; border: none; border-bottom: 1px solid #ccc; font-size: 15px; background: transparent; }
      .neume-palette-list { overflow: auto; }
      .neume-row { display: flex; align-items: center; gap: 10px; padding: 6px 10px; cursor: pointer; }
      .neume-fam-cell { display: flex; flex-direction: column; align-items: center; gap: 1px; }
      .neume-fam-cell span { font-size: 9px; color: #7a6a55; line-height: 1; }
      .neume-fam-sep { display: inline-block; width: 1px; height: 30px; background: #c8b89a; margin: 0 3px; align-self: center; }
      .neume-row.sel, .neume-row:hover { background: var(--cream-deep); }
      .neume-row svg, .neume-tooltip svg { color: #1a1a1a; }
      .neume-tooltip, .gabc-tooltip { max-width: 320px; padding: 8px 10px; font-family: serif; background: var(--surface); color: var(--ink); }
      .staff-legend { padding: 4px 10px; font-family: serif; font-size: 13px; border-top: 1px solid var(--rule); background: var(--cream-deep); }
      .staff-legend .legend-cell { margin-right: 8px; white-space: nowrap; }
      #footer-bar {
        flex: 0 0 auto;
        display: flex;
        align-items: stretch;
        background: var(--cream-deep);
        border-top: 1px solid var(--rule);
      }
      #status {
        flex: 1 1 auto;
        font: 12px/1.6 ui-monospace, monospace;
        color: var(--ink-muted);
        padding: 2px 10px;
        white-space: pre;
        border: none;
      }
      #family {
        flex: 0 0 auto;
        font: 12px/1.6 serif;
        color: var(--ink-soft);
        padding: 2px 10px;
        cursor: pointer;
        border-left: 1px solid var(--rule);
        white-space: nowrap;
        user-select: none;
      }
      #family:hover { text-decoration: underline; background: var(--cream-deep); }
      /* NABC em composição — campo inteiro tratado como um único neuma */
      .nabc-composing { background: var(--cream-deep); border-bottom: 2px solid var(--rubric-soft); }
    </style>
  </head>
  <body>
    <div id="toolbar"></div>
    <div id="workspace" style="flex:1 1 auto; display:flex; min-height:0;">
      <div id="app" style="flex:1 1 0; overflow:auto;"></div>
      <div id="preview" style="flex:1 1 0; overflow:auto;"></div>
    </div>
    <div id="footer-bar">
      <span id="status">pronto</span>
      <span id="family" title="Família ativa (clique para alternar)">✠ St. Gall</span>
    </div>
    <div id="overlay-host" style="position:fixed; top:0; right:0; width:420px; max-height:100vh; overflow:auto; z-index:60; display:none;"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
