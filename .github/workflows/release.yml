name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, label: macos-arm, bundles: dmg, glob: "src-tauri/target/release/bundle/dmg/*.dmg" }
          - { os: macos-13, label: macos-intel, bundles: dmg, glob: "src-tauri/target/release/bundle/dmg/*.dmg" }
          - { os: ubuntu-22.04, label: linux, bundles: appimage, glob: "src-tauri/target/release/bundle/appimage/*.AppImage" }
          - { os: windows-latest, label: windows, bundles: nsis, glob: "src-tauri/target/release/bundle/nsis/*-setup.exe" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Dependências do sistema (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      # Sidecar LSP compilado para o host (nome esperado pelo externalBin do Tauri).
      - name: Build gregorio-lsp sidecar
        shell: bash
        run: npm run sidecar

      # Os assets portáveis (wasm + neume-db.json) são versionados; o frontend
      # (beforeBuildCommand: npm run build) compila direto. tauri build empacota nativo.
      - name: Build + bundle
        run: npx tauri build --bundles ${{ matrix.bundles }}

      - uses: actions/upload-artifact@v4
        with:
          name: notker-${{ matrix.label }}
          path: ${{ matrix.glob }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: release
    needs: build
    # !cancelled() em vez de success(): publica os assets que existirem mesmo se
    # alguma plataforma falhar (ex.: Linux). Uma plataforma flaky não bloqueia o
    # release. fail_on_unmatched_files: false tolera globs ausentes.
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publicar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Notker ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          fail_on_unmatched_files: false
          files: |
            artifacts/notker-macos-arm/*.dmg
            artifacts/notker-macos-intel/*.dmg
            artifacts/notker-linux/*.AppImage
            artifacts/notker-windows/*-setup.exe
          body: |
            ## Downloads

            - macOS Apple Silicon: `.dmg` (arm64) · macOS Intel: `.dmg` (x64) · Linux: `.AppImage` · Windows: `.exe`

            **Builds não assinadas.**

            - **macOS** — o Gatekeeper marca apps baixados como "danificados" (sobretudo no Apple Silicon). Após arrastar o Notker para `/Applications`, rode uma vez no Terminal:
              ```
              xattr -dr com.apple.quarantine /Applications/Notker.app
              ```
              Depois abra normalmente. (Ctrl+clique → Abrir só funciona em alguns casos; o comando acima resolve sempre.)
            - **Windows** — SmartScreen → "Mais informações" → "Executar assim mesmo".
