name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Cria a Release (vazia) uma única vez, antes dos builds. Evita corrida de
  # criação entre os jobs paralelos do matrix e centraliza o corpo/metadados.
  create-release:
    name: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Notker ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          body: |
            ## Downloads

            - **Linux:** `.rpm` (Fedora/openSUSE) · `.deb` (Debian/Ubuntu) · `.AppImage` (portátil)
            - **macOS:** Apple Silicon `.dmg` (arm64) · Intel `.dmg` (x64) — **Windows:** `.exe`
            - _Cada asset é publicado assim que a plataforma termina._

            **Builds não assinadas.**

            - **Linux** — em distribuições recentes, prefira o `.rpm`/`.deb` (usam o WebKit do sistema). O `.AppImage` pode abrir em branco em alguns sistemas.
            - **macOS** — após arrastar o Notker para `/Applications`, rode uma vez no Terminal:
              ```
              xattr -dr com.apple.quarantine /Applications/Notker.app
              ```
              Depois abra normalmente.
            - **Windows** — SmartScreen → "Mais informações" → "Executar assim mesmo".

  build:
    name: build ${{ matrix.label }}
    needs: create-release
    # Roda após create-release em tags; em workflow_dispatch (sem tag)
    # create-release é "skipped" e mesmo assim seguimos com os builds.
    if: ${{ always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') }}
    runs-on: ${{ matrix.os }}
    # Cap contra runner travado (ex.: macos-13 Intel rodou 3h26m antes de falhar).
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, label: macos-arm, bundles: dmg, glob: "src-tauri/target/release/bundle/dmg/*.dmg" }
          - { os: macos-13, label: macos-intel, bundles: dmg, glob: "src-tauri/target/release/bundle/dmg/*.dmg" }
          - os: ubuntu-24.04
            label: linux
            bundles: appimage,deb,rpm
            glob: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
          - { os: windows-latest, label: windows, bundles: nsis, glob: "src-tauri/target/release/bundle/nsis/*-setup.exe" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Dependências do sistema (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      # Sidecar LSP compilado para o host (nome esperado pelo externalBin do Tauri).
      - name: Build gregorio-lsp sidecar
        shell: bash
        run: npm run sidecar

      # Os assets portáveis (wasm + neume-db.json) são versionados; o frontend
      # (beforeBuildCommand: npm run build) compila direto. tauri build empacota nativo.
      - name: Build + bundle
        run: npx tauri build --bundles ${{ matrix.bundles }}

      - uses: actions/upload-artifact@v4
        with:
          name: notker-${{ matrix.label }}
          path: ${{ matrix.glob }}
          if-no-files-found: error
          retention-days: 30

      # Publica o asset DESTA plataforma assim que ela termina — independe das
      # outras. Uma plataforma lenta/travada (Intel) nunca segura o arm64.
      - name: Anexar asset ao Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.glob }}
          fail_on_unmatched_files: false
